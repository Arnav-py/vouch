<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #111827, #030712);
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

.card {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    padding: 40px 60px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

.number {
    font-size: 90px;
    font-weight: bold;
    transition: transform 0.3s ease, opacity 0.3s ease;
}

.progress {
    margin-top: 25px;
    height: 6px;
    width: 100%;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #6366f1, #3b82f6);
    width: 100%;
    transition: width 1s linear;
}

.fade-out {
    animation: fadeOut 0.5s forwards;
}

@keyframes fadeOut {
    to { opacity: 0; transform: scale(0.95); }
}
</style>
</head>

<body>

<div class="card" id="card">
    <div class="number" id="count">3</div>
    <div>Redirecting...</div>

    <div class="progress">
        <div class="progress-bar" id="bar"></div>
    </div>
</div>

<script>
let timeLeft = 3;
const totalTime = 3;
const count = document.getElementById("count");
const bar = document.getElementById("bar");
const card = document.getElementById("card");

const interval = setInterval(() => {

    timeLeft--;

    if (timeLeft >= 1) {
        count.style.transform = "scale(1.3)";
        count.style.opacity = "0.5";

        setTimeout(() => {
            count.textContent = timeLeft;
            count.style.transform = "scale(1)";
            count.style.opacity = "1";
        }, 150);
    }

    bar.style.width = (timeLeft / totalTime) * 100 + "%";

    if (timeLeft === 0) {
        count.textContent = "1";
    }

    if (timeLeft <= 0) {
        clearInterval(interval);
        setTimeout(() => {
            card.classList.add("fade-out");
            setTimeout(() => {
                window.location.href = "https://discord.com/oauth2/authorize?client_id=1455583448986030105&permissions=8&integration_type=0&scope=bot+applications.commands"; // PUT YOUR LINK HERE
            }, 500);
        }, 850);
    }

}, 1000);
</script>

</body>
</html>
